<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>딥러닝·개발 핵심 용어집</title>
  <script>
    (function () {
      var t = localStorage.getItem('glossary_theme');
      document.documentElement.dataset.theme = t === 'light' ? 'light' : 'dark';
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">📚</span>
          <div>
            <h1>핵심 용어집</h1>
            <p class="logo-sub">딥러닝 · NLP · LLM</p>
          </div>
        </div>
      </div>

      <div class="search-box">
        <input type="search" id="searchInput" placeholder="용어 검색..." autocomplete="off">
      </div>

      <nav class="chapter-nav" id="chapterNav"></nav>

      <div class="sidebar-stats">
        <div class="stat">
          <span class="stat-value" id="statLearned">0</span>
          <span class="stat-label">학습 완료</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="statTotal">0</span>
          <span class="stat-label">전체 용어</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="menu-toggle" id="menuToggle" aria-label="메뉴">☰</button>
        <div class="mode-tabs" id="modeTabs">
          <button class="mode-tab active" data-mode="browse">📖 목록</button>
          <button class="mode-tab" data-mode="flashcard">🃏 플래시카드</button>
          <button class="mode-tab" data-mode="quiz">✅ 퀴즈</button>
        </div>
        <div class="topbar-actions">
          <button type="button" id="themeToggle" class="theme-switch" aria-label="테마 전환">
            <span id="themeIcon">☀️</span>
            <span id="themeLabel">화이트 모드</span>
          </button>
          <label class="toggle-learned">
            <input type="checkbox" id="hideLearned">
            <span>학습 완료 숨기기</span>
          </label>
        </div>
      </header>

      <section class="panel browse-panel active" id="browsePanel">
        <div class="panel-header">
          <h2 id="browseTitle">전체 용어</h2>
          <span class="term-count" id="browseCount"></span>
        </div>
        <div class="term-grid" id="termGrid"></div>
        <p class="empty-state hidden" id="browseEmpty">검색 결과가 없습니다.</p>
      </section>

      <section class="panel flashcard-panel" id="flashcardPanel">
        <div class="flashcard-controls">
          <select id="flashChapterSelect"></select>
          <span class="flash-progress" id="flashProgress">1 / 35</span>
        </div>
        <div class="flashcard-container">
          <div class="flashcard" id="flashcard">
            <div class="flashcard-inner">
              <div class="flashcard-front">
                <span class="flash-chapter" id="flashChapter"></span>
                <h2 id="flashTitle"></h2>
                <p class="flash-hint">클릭하거나 Space 키로 뒤집기</p>
              </div>
              <div class="flashcard-back">
                <div class="flash-section" id="flashEasy"></div>
                <div class="flash-section" id="flashExample"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="flashcard-actions">
          <button class="btn btn-secondary" id="flashPrev">← 이전</button>
          <button class="btn btn-primary" id="flashLearned">학습 완료 ✓</button>
          <button class="btn btn-secondary" id="flashNext">다음 →</button>
        </div>
        <p class="keyboard-hint">← → 이동 · Space 뒤집기 · Enter 학습 완료</p>
      </section>

      <section class="panel quiz-panel" id="quizPanel">
        <div class="quiz-header">
          <select id="quizChapterSelect"></select>
          <div class="quiz-score">
            <span id="quizScore">0</span> / <span id="quizTotal">0</span>
          </div>
        </div>
        <div class="quiz-card" id="quizCard">
          <p class="quiz-label">다음 설명에 맞는 용어는?</p>
          <p class="quiz-question" id="quizQuestion"></p>
          <div class="quiz-options" id="quizOptions"></div>
        </div>
        <div class="quiz-feedback hidden" id="quizFeedback">
          <p id="quizFeedbackText"></p>
          <button class="btn btn-primary" id="quizNext">다음 문제</button>
        </div>
        <div class="quiz-start" id="quizStart">
          <p>쉬운 설명을 보고 맞는 용어를 고르세요.</p>
          <button class="btn btn-primary btn-lg" id="quizStartBtn">퀴즈 시작</button>
        </div>
        <div class="quiz-done hidden" id="quizDone">
          <h3>퀴즈 완료!</h3>
          <p id="quizResultText"></p>
          <button class="btn btn-primary" id="quizRestart">다시 하기</button>
        </div>
      </section>
    </main>
  </div>

  <div class="modal hidden" id="termModal">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-content">
      <button class="modal-close" id="modalClose" aria-label="닫기">×</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="data/terms.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
